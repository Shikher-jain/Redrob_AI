ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  No candidate data was fed to any LLM.
  All ranking logic is implemented in local Python — no API calls during ranking.

methodology_summary: |
  Hybrid semantic + structured feature ranker. Semantic layer uses
  sentence-transformers all-MiniLM-L6-v2 (LSA/TF-IDF fallback for offline use).
  Structured features: career quality (YOE, product vs consulting fraction,
  title alignment, production evidence), skill match (proficiency × credibility
  from endorsements + duration, assessment override), behavioral engagement (23
  Redrob signals weighted by recruiter response rate), location/availability.
  Honeypot detection via date inconsistency and zero-evidence expert skills.
  Second-pass reranker surfaces plain-language candidates by scanning role
  descriptions for IR/ML work evidence. Runtime <5 min on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
